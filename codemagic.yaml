workflows:
  android-build:
    name: Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - target: main
    scripts:
      - name: Initialize Android Template
        script: |
          # توليد البيئة والبنية التحتية للأندرويد بشكل فوري وقاطع
          flutter create . --platforms=android --project-name=open_the_path
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/**/app-release.apk
    publishing:
      email:
        recipients:
          - your_email@example.com # ضع إيميلك الشخصي هنا لتستلم التطبيق فوراً
        notify:
          success: true
          failure: true
