pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "com.android.application" version "7.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.7.10" apply false
}

// ابتكار ديناميكي لقراءة مسار فلاتر المحلي داخل سيرفر Codemagic وحقن الملحق برمجياً
def localProperties = new Properties()
def localPropertiesFile = new File(settingsDir, "local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    flutterRoot = '/Users/builder/programs/flutter'
}

def flutterPluginRepo = new File(flutterRoot, 'packages/flutter_tools/gradle')

pluginManagement {
    plugins {
        id "dev.flutter.flutter-gradle-plugin" version "1.0.0"
    }
    resolutionStrategy {
        eachPlugin {
            if (requested.id.id == "dev.flutter.flutter-gradle-plugin") {
                useModule("dev.flutter:flutter_gradle_plugin:1.0.0")
            }
        }
    }
}

include ":app"
